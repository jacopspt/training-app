<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Training App</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; color: #111; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f5;
        --color-background-tertiary: #ebebeb;
        --color-text-primary: #111111;
        --color-text-secondary: #555555;
        --color-text-tertiary: #999999;
        --color-text-info: #1a6fb5;
        --color-text-success: #1a7a3c;
        --color-text-danger: #c0392b;
        --color-text-warning: #b7600a;
        --color-border-primary: rgba(0,0,0,0.4);
        --color-border-secondary: rgba(0,0,0,0.3);
        --color-border-tertiary: rgba(0,0,0,0.15);
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1a1a1a; color: #efefef; }
        :root {
          --color-background-primary: #1a1a1a;
          --color-background-secondary: #242424;
          --color-background-tertiary: #2e2e2e;
          --color-text-primary: #efefef;
          --color-text-secondary: #aaaaaa;
          --color-text-tertiary: #666666;
          --color-text-info: #5aadff;
          --color-text-success: #4caf7d;
          --color-text-danger: #e57373;
          --color-border-primary: rgba(255,255,255,0.4);
          --color-border-secondary: rgba(255,255,255,0.3);
          --color-border-tertiary: rgba(255,255,255,0.15);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
